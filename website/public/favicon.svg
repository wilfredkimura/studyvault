<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient matching the application's: --color-primary (#c8bfff) to --color-secondary (#e1b6ff) -->
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8bfff" />
      <stop offset="100%" stop-color="#e1b6ff" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background with rounded-default proportion -->
  <rect width="512" height="512" rx="128" fill="url(#logo-gradient)" />
  <!-- Vector path drawing a bold letter S in the center to ensure cross-browser compatibility -->
  <path d="M320 160 C320 110, 192 110, 192 160 C192 210, 320 230, 320 300 C320 350, 192 350, 192 300" fill="none" stroke="#2c009e" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" />
</svg>